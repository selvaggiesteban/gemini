
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gemini Cloud IDE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.40.0/min/vs/loader.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/xterm/3.14.5/xterm.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/3.14.5/xterm.min.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: #1e1e1e; color: #d4d4d4; display: flex; height: 100vh; }
        #sidebar { width: 250px; background: #252526; border-right: 1px solid #333; display: flex; flex-direction: column; }
        #file-list { flex: 1; overflow-y: auto; padding: 10px; font-size: 13px; }
        .file-item { padding: 4px; cursor: pointer; }
        .file-item:hover { background: #2a2d2e; }
        #main { flex: 1; display: flex; flex-direction: column; }
        #editor-container { flex: 1; }
        #terminal-container { height: 300px; border-top: 1px solid #333; background: #000; }
    </style>
</head>
<body>
    <div id="sidebar"><div id="file-list"></div></div>
    <div id="main">
        <div id="editor-container"></div>
        <div id="terminal-container"></div>
    </div>
    <script>
        // Monaco & Xterm Logic here (simplified for space)
        console.log("Cloud IDE Loaded");
    </script>
</body>
</html>
